<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="index.css" media="screen" />

    <title>3D</title>

</head>
<body>
    <!--CABEÇALHO-->
    <header>
        <div id="container-header">

            <div id="logo">LOGO</div>

            <ul>
                <li><a href="">INICIO</a></li>
                <li><a href="">CONTATO</a></li>
                <li><a href="">SHOP</a></li>
            </ul>
            <div id="container-search">
                <ion-icon name="search-sharp"></ion-icon>
                <input id="search" type="search" placeholder="   Search...">
            </div>

        </div>
    </header>

    <!--MEIO DO SITE-->
    <article>
        <div id="container-geral-article">

            <div id="container-redes-sociais">
                <ion-icon name="logo-facebook"></ion-icon>
                <ion-icon name="logo-instagram"></ion-icon>
                <ion-icon name="logo-youtube"></ion-icon>
                <ion-icon name="logo-whatsapp"></ion-icon>
                <ion-icon name="logo-twitter"></ion-icon>
            </div>

            <div id="info">
                <h3>DAVID</h3>
                <div>Essa é uma das esculturas mais famosas do artista renascentista Michelangelo</div>
                <h4>XVI</h4>
            </div>
            
            <model-viewer alt="model statue" src="objeto/scene.gltf"  auto-rotate ar ios-scr="objeto/scene.gltf"></model-viewer>
            <!--adicionar "camera-controls" para visualizar a imagem com o mouse-->

        </div>

    </article>

    <!--RODAPÉ-->
    <footer>
        <div>DESELVOLVIDO POR MATHEUS DAVY</div>
    </footer>

</body>


<!--estatua-->
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
<!--icones-->
<script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
<script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>

</html>
